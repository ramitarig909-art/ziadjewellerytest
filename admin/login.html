<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<title>Sign in · ZIAD</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ivory:#FAF6EF; --espresso:#241F1A; --ink:#2E2922; --gold:#B8923D;
  --gold-bright:#D8B25A; --gold-deep:#977629; --muted:#7d7568;
  --line-soft:rgba(36,31,26,.10); --warn:#a8442e;
  --serif:'Cormorant Garamond',Georgia,serif; --sans:'Jost',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);font-weight:300;color:var(--espresso);
  background:radial-gradient(900px 500px at 50% -10%,#fff,var(--ivory))}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.login-card{background:#fff;border:1px solid var(--line-soft);border-radius:6px;
  padding:2.6rem 2.2rem;width:100%;max-width:380px;text-align:center;
  box-shadow:0 20px 50px -24px rgba(36,31,26,.35)}
.brand{font-family:var(--serif);font-size:2rem;color:var(--gold-deep);letter-spacing:2px}
.brand-sub{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin:.2rem 0 1.8rem}
.field{text-align:left;margin-bottom:1.1rem}
.field label{display:block;font-size:.74rem;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.4rem}
.field input{width:100%;border:1px solid var(--line-soft);border-radius:2px;padding:.75rem .85rem;
  background:var(--ivory);color:var(--ink);font-size:.92rem;font-family:inherit}
.field input:focus{outline:none;border-color:var(--gold)}
.btn{width:100%;justify-content:center;display:inline-flex;align-items:center;gap:.5rem;
  font-family:inherit;font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;
  padding:.85rem 1.5rem;border:none;border-radius:2px;margin-top:.5rem;
  background:linear-gradient(120deg,var(--gold-deep),var(--gold),var(--gold-bright));color:#241402;font-weight:500}
.btn:disabled{opacity:.6;cursor:default}
.err{background:#f7e9e6;color:var(--warn);font-size:.82rem;border-radius:3px;padding:.6rem .8rem;margin-bottom:1rem;display:none}
.err.show{display:block}
.back{display:inline-block;margin-top:1.3rem;font-size:.76rem;color:var(--muted);text-decoration:none}
.back:hover{color:var(--gold-deep)}
</style>

<!-- Vercel Web Analytics -->
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>
  <div class="login-wrap">
    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="brand">ZIAD</div>
      <div class="brand-sub">Owner Dashboard</div>
      <div class="err" id="err"></div>
      <div class="field"><label>Email</label>
        <input type="email" id="email" required autocomplete="username" placeholder="owner@ziadjewellery.com" /></div>
      <div class="field"><label>Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" /></div>
      <button type="submit" class="btn" id="submitBtn">Sign In</button>
      <a class="back" href="/index.html">← Back to website</a>
    </form>
  </div>

  <script src="/assets/js/lib/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const cfg = window.ZIAD_SUPABASE || {};
    const sb = window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);
    const err = document.getElementById("err");
    const btn = document.getElementById("submitBtn");

    // Already signed in? Go straight to the dashboard.
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.replace("/admin/dashboard.html");
    });

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.remove("show");
      btn.disabled = true; btn.textContent = "Signing in…";
      try {
        const { error } = await sb.auth.signInWithPassword({
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value
        });
        if (error) throw error;
        window.location.replace("/admin/dashboard.html");
      } catch (ex) {
        err.textContent = ex.message || "Invalid email or password.";
        err.classList.add("show");
        btn.disabled = false; btn.textContent = "Sign In";
      }
    });
  </script>
</body>
</html>
