<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · ZIAD Jewellery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>
  <a class="login-back" href="/index.html">← Back to website</a>
  <div class="login-wrap">
    <form class="login-card" id="loginForm" autocomplete="on">
      <div class="brand">
        <div class="logo">ZIAD<b>.</b></div>
        <small>Admin Dashboard</small>
      </div>
      <div class="err" id="err"></div>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required autocomplete="username" placeholder="admin@ziad.com" />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="btn-gold" id="submitBtn">Sign in</button>
    </form>
  </div>

  <!-- Supabase config + auth -->
  <script src="/assets/js/lib/config.js"></script>
  <script type="module">
    import { signIn, redirectIfAuthed } from "/assets/js/lib/auth.js";
    import { toast } from "/assets/js/lib/ui.js";

    // If already signed in, skip straight to the dashboard.
    redirectIfAuthed();

    const form = document.getElementById("loginForm");
    const err  = document.getElementById("err");
    const btn  = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.classList.remove("show");
      btn.disabled = true;
      btn.textContent = "Signing in…";
      try {
        await signIn(email.value.trim(), password.value);
        toast("Login successful", "success");
        window.location.replace("/admin/dashboard.html");
      } catch (ex) {
        err.textContent = ex.message || "Invalid email or password.";
        err.classList.add("show");
        btn.disabled = false;
        btn.textContent = "Sign in";
      }
    });
  </script>
</body>
</html>
